<!DOCTYPE html>
<html lang="en" class="is-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title i18n>
        Admin Panel | BokoFS
        // 管理介面 | BokoFS
    </title>
    <meta name="boko.csrf.Token" content="{{.csrfToken}}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tocas-ui/5.0.2/tocas.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tocas-ui/5.0.2/tocas.min.js"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Locales -->
    <script src="./js/dom-i18n.min.js"></script>
    <script src="./js/theme.js"></script>
    <style>
        #msgbox{
            position: fixed;
            bottom: 1em;
            right: 1em;
            z-index: 9999;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        dialog[open] {
            animation: fadeIn 0.3s ease-in-out;
        }

        
    </style>
    <script>
        //Add a new function to jquery for ajax override with csrf token injected
        $.cjax = function(payload){
            let requireTokenMethod = ["POST", "PUT", "DELETE"];
            if (requireTokenMethod.includes(payload.method) || requireTokenMethod.includes(payload.type)){
                //csrf token is required
                let csrfToken = document.getElementsByTagName("meta")["boko.csrf.Token"].getAttribute("content");
                payload.headers = {
                    "X-CSRF-Token": csrfToken,
                }
            }

            $.ajax(payload);
        }
    </script>
    <link rel="icon" type="image/png" href="img/favicon.png">
</head>
<body>
    <div class="ts-content ">
        <div class="ts-container">
            <div style="float: right;">
                <button class="ts-button is-start-icon" data-dropdown="languages">
                    <span class="ts-icon is-language-icon"></span>
                    <span id="currentLanguage">System</span>
                </button>
                <div class="ts-dropdown" id="languages">
                    <button class="item" onclick="setCurrentLanguage('en');">English</button>
                    <button class="item" onclick="setCurrentLanguage('zh');">中文（正體）</button>
                </div>
                <button class="ts-button is-icon" id="darkModeToggle">
                    <span class="ts-icon is-moon-icon"></span>
                </button>
            </div>
            <div class="ts-tab is-pilled">
                <a href="" class="item" style="user-select: none;">
                    <img id="sysicon" class="ts-image" style="height: 30px" src="img/logo.svg"></img>
                </a>
                <button href="#!" class="item" data-tab="tab-status" i18n>
                    Status
                    // 系統狀態
                </button>
                <button href="#!" class="item" data-tab="tab-connections" i18n>
                    Connections
                    // 連接
                </button>
                <button href="#!" class="item" data-tab="tab-disks" i18n>
                    Disks
                    // 磁碟資訊
                </button>
                <button href="#!" class="item is-active" data-tab="tab-raid" i18n>
                    RAID
                    // 磁碟陣列
                </button>
                <button href="#!" class="item" data-tab="tab-tools" i18n>
                    Tools
                    // 工具
                </button>
                <button href="#!" class="item" data-tab="tab-logs" i18n>
                    Logs
                    // 日誌
                </button>
                <button href="#!" class="item" data-tab="tab-settings" i18n>
                    Settings
                    // 設定
                </button>
            </div>
        </div>
    </div>
    <div class="ts-divider"></div>

    <!-- Degraded mode / missing-dep notice. Hidden until JS populates it. -->
    <div id="boko-dep-warning" style="display:none; background: var(--ts-warning-100, #fffbe6); border-bottom: 1px solid var(--ts-warning-400, #ffe58f); padding: 0.6em 0;">
        <div class="ts-container">
            <span style="font-weight: 600; color: var(--ts-warning-700, #d48806);">
                &#9888; <span i18n>Running in Degraded Mode — some features are disabled
                    // 以降級模式運行 — 部分功能已停用
                </span>
            </span>
            <ul id="boko-dep-missing-list" style="margin: 0.3em 0 0 1.4em; font-size: 0.9em; color: var(--ts-gray-700);"></ul>
        </div>
    </div>

    <div>
        <div class="boko-panel-component" id="tab-status" component="status.html">Status</div>
        <div class="boko-panel-component" id="tab-connections" component="connections.html">Connections</div>
        <div class="boko-panel-component" id="tab-disks" component="disks.html">Disks</div>
        <div class="boko-panel-component" id="tab-raid" component="raid.html">RAID</div>
        <div class="boko-panel-component" id="tab-tools">Tools</div>
        <div class="boko-panel-component" id="tab-logs">Logs</div>
        <div class="boko-panel-component" id="tab-settings">Settings</div>
    </div>
    <div class="ts-container">
        <div class="ts-divider"></div>
        <div class="ts-content">
            <div class="ts-text">
                BokoFS © tobychui 2024 - <span class="thisyear">2025</span>
            </div>
        </div>
    </div>
    <div id="msgbox" class="ts-snackbar has-start-padded-large has-end-padded-large">
        <div class="content"></div>
        <button class="close"></button>
    </div>
    <script>
        var ajaxRequests = [];
        $(".boko-panel-component").each(function(){
            var component = $(this).attr("component");
            if (component) {
               $(this).load("./components/" + component, function(response, status, xhr) {
                   if (status == "success") {
                       console.log("Component loaded successfully:", component);
                       if (typeof(relocale) != "undefined") {
                           relocale();
                       }
                   } else {
                       console.error("Failed to load component:", component, xhr.status, xhr.statusText);
                   }
               });
            }
        });

        $(".thisyear").text(new Date().getFullYear());

        function msgbox(msg, delay=3000){
            $("#msgbox .content").text(msg);
            $("#msgbox").stop().finish().fadeIn(200).delay(delay).fadeOut(200);
        }

        $("#msgbox .close").click(function(){
            $("#msgbox").stop().finish().fadeOut(200);
        });
        $("#msgbox").hide();

        /* ── Dependency / feature-gating ── */

        // Stored globally so components (e.g. status.html) can read it after
        // they finish loading.
        window.bokoDepReport = null;

        /**
         * applyFeatureGating(report)
         *
         * Receives the DependencyReport from /api/info/deps and:
         *  1. Shows a degraded-mode banner listing every missing dep.
         *  2. Disables navigation tabs for features whose deps are absent.
         */
        function applyFeatureGating(report) {
            window.bokoDepReport = report;

            var missing = report.deps ? report.deps.filter(function(d){ return !d.found; }) : [];

            if (report.degradedMode || missing.length > 0) {
                var list = $("#boko-dep-missing-list");
                list.empty();
                missing.forEach(function(dep) {
                    var hints = "";
                    if (dep.installHints && dep.installHints.length > 0) {
                        hints = " &nbsp;—&nbsp; <code>" + dep.installHints[0] + "</code>";
                    }
                    list.append("<li><b>" + dep.name + "</b>" + hints + " <span style='color:var(--ts-gray-500);'>(" + dep.description + ")</span></li>");
                });

                // Only show the banner when deps are genuinely missing
                if (missing.length > 0) {
                    $("#boko-dep-warning").show();
                }
            }

            // Disable tabs for unavailable features.
            // A feature is "unavailable" when any dep tagged with it is missing.
            var unavailableFeatures = {};
            if (report.deps) {
                report.deps.forEach(function(dep) {
                    if (!dep.found) {
                        unavailableFeatures[dep.feature] = true;
                    }
                });
            }

            if (unavailableFeatures["raid"]) {
                var raidTab = $('[data-tab="tab-raid"]');
                raidTab.addClass("is-disabled").css("opacity", "0.45").css("cursor", "not-allowed")
                       .attr("title", "RAID management is unavailable (mdadm not found)");
                raidTab.off("click").on("click", function(e){ e.stopImmediatePropagation(); return false; });
            }

            if (unavailableFeatures["disks"]) {
                var disksTab = $('[data-tab="tab-disks"]');
                disksTab.addClass("is-disabled").css("opacity", "0.45").css("cursor", "not-allowed")
                        .attr("title", "Disk enumeration is unavailable");
                disksTab.off("click").on("click", function(e){ e.stopImmediatePropagation(); return false; });
            }

            // Fire a custom event so loaded components can react immediately.
            $(document).trigger("boko:depsloaded", [report]);
        }

        function loadAndApplyDeps() {
            $.get("./api/info/deps", function(report) {
                applyFeatureGating(report);
            }).fail(function() {
                console.warn("bokodm: could not fetch dependency report from /api/info/deps");
            });
        }

        $(document).ready(function(){ loadAndApplyDeps(); });

    </script>
    <script src="./js/locale.js"></script>
</body>
</html>
