<!DOCTYPE html>
<html lang="en" class="is-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title i18n>
        Admin Panel | BokoDM
        // 管理介面 | BokoDM
    </title>
    <meta name="boko.csrf.Token" content="{{.csrfToken}}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tocas-ui/5.0.2/tocas.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tocas-ui/5.0.2/tocas.min.js"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Locales -->
    <script src="./js/dom-i18n.min.js"></script>
    <script src="./js/theme.js"></script>
    <style>
        #msgbox{
            position: fixed;
            bottom: 1em;
            right: 1em;
            z-index: 9999;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        dialog[open] {
            animation: fadeIn 0.3s ease-in-out;
        }

        /* Closed dialogs must stay hidden, also on mobile where
           tocas mobile:is-fullscreen styling would otherwise reveal them */
        dialog.ts-modal:not([open]){
            display: none !important;
        }

        /* Global blocking loading overlay for slow disk operations */
        #boko-loading{
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 99999;
            align-items: center;
            justify-content: center;
        }
        #boko-loading .loading-box{
            background: var(--ts-gray-50, #fff);
            border-radius: 0.6em;
            padding: 1.4em 2em;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        /* Mobile side menu */
        #mobile_menu_backdrop{
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 9998;
        }
        #mobile_side_menu{
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 260px;
            max-width: 80vw;
            background: var(--ts-gray-50, #fff);
            z-index: 9999;
            transform: translateX(-105%);
            transition: transform 0.25s ease;
            box-shadow: 2px 0 12px rgba(0,0,0,0.25);
            overflow-y: auto;
        }
        #mobile_side_menu.open{
            transform: translateX(0);
        }
        #mobile_menu_toggle{
            display: none;
        }
        @media (max-width: 768px){
            #main_menu .item[data-tab]{
                display: none !important;
            }
            #mobile_menu_toggle{
                display: inline-flex !important;
            }
        }
    </style>
    <script>
        //Add a new function to jquery for ajax override with csrf token injected
        $.cjax = function(payload){
            let requireTokenMethod = ["POST", "PUT", "DELETE"];
            if (requireTokenMethod.includes(payload.method) || requireTokenMethod.includes(payload.type)){
                //csrf token is required
                let csrfToken = document.getElementsByTagName("meta")["boko.csrf.Token"].getAttribute("content");
                payload.headers = {
                    "X-CSRF-Token": csrfToken,
                }
            }

            $.ajax(payload);
        }
    </script>
    <link rel="icon" type="image/png" href="img/favicon.png">
</head>
<body>

        <div class="ts-container">

                <button class="ts-button is-start-icon" data-dropdown="languages">
                    <span class="ts-icon is-language-icon"></span>

                <button href="#!" class="item" data-tab="tab-disks" i18n>

    <div class="ts-divider"></div>

    <!-- Degraded mode / missing-dep notice. Hidden until JS populates it. -->

        <div class="boko-panel-component" id="tab-connections" component="connections.html">Connections</div>
        <div class="boko-panel-component" id="tab-disks" component="disks.html">Disks</div>

    <div class="ts-container">

    <!-- Global loading overlay -->
    <div id="boko-loading">
        <div class="loading-box">
            <span class="ts-icon is-spinning is-circle-notch-icon" style="font-size: 2em;"></span>
            <div class="ts-text has-top-spaced-small" id="boko-loading-text">Working...</div>

    <!-- Mobile side menu -->
    <div id="mobile_menu_backdrop" onclick="closeMobileMenu();"></div>
    <div id="mobile_side_menu">
        <div class="ts-content">
            <img class="ts-image" style="height: 28px;" src="img/logo.svg">
            <button class="ts-close" style="float: right;" onclick="closeMobileMenu();"></button>
        </div>
        <div class="ts-divider"></div>
        <div class="ts-menu" id="mobile_menu_items"></div>
    </div>
    <script>
        /* ── Global loading overlay ──
           Blocks the UI during slow disk operations so the user cannot
           trigger the same action twice. */
        function showLoading(msg){
            $("#boko-loading-text").text(msg || "Working...");
            $("#boko-loading").css("display", "flex");
        }
        function hideLoading(){
            $("#boko-loading").hide();
        }

        /* ── Mobile side menu ── */
        function openMobileMenu(){
            // Rebuild the items from the top tab bar so labels follow the
            // current language and active tab
            let menu = $("#mobile_menu_items");
            menu.empty();
            $("#main_menu .item[data-tab]").each(function(){
                let tabId = $(this).attr("data-tab");
                let label = $(this).text().trim();
                let isActive = $(this).hasClass("is-active");
                menu.append(`<a class="item ${isActive ? "is-active" : ""}" onclick="mobileMenuNavigate('${tabId}');">${label}</a>`);
            });
            $("#mobile_menu_backdrop").show();
            $("#mobile_side_menu").addClass("open");
        }

        function closeMobileMenu(){
            $("#mobile_side_menu").removeClass("open");
            $("#mobile_menu_backdrop").hide();
        }

        function mobileMenuNavigate(tabId){
            // Proxy the click to the real (hidden) tab button so the tocas
            // tab logic keeps handling panel switching
            $(`#main_menu .item[data-tab="${tabId}"]`).click();
            closeMobileMenu();
        }
    </script>

    <!-- Shared host folder picker, use pickFolder(callback) to open -->
    <dialog id="folder_picker" class="ts-modal">
        <div class="content">
            <div class="ts-content">
                <div class="ts-header" i18n>Select Folder
                    // 選擇資料夾
                </div>
                <div class="ts-text is-description is-code" id="folder_picker_path" style="word-break: break-all;">/</div>
            </div>
            <div class="ts-divider"></div>
            <div class="ts-content" style="max-height: 320px; overflow-y: auto;">
                <div id="folder_picker_list" class="ts-menu is-dense"></div>
            </div>
            <div class="ts-divider"></div>
            <div class="ts-content">
                <div class="ts-input is-fluid">
                    <input type="text" id="folder_picker_newname" placeholder="new folder name">
                </div>
                <button class="ts-button is-small is-outlined has-top-spaced-small" onclick="folderPickerMkdir();" i18n>Create Folder Here
                    // 在此建立資料夾
                </button>
            </div>
            <div class="ts-divider"></div>
            <div class="ts-content is-tertiary">
                <div class="ts-wrap is-end-aligned">
                    <button class="ts-button is-positive" onclick="folderPickerConfirm();" i18n>Select This Folder
                        // 選擇此資料夾
                    </button>
                    <button class="ts-button" onclick="$('#folder_picker')[0].close();" i18n>Cancel
                        // 取消
                    </button>
                </div>
            </div>
        </div>
    </dialog>
    <script>
        /* ── Shared folder picker ── */
        var folderPickerCallback = null;
        var folderPickerCurrentDir = "/";

        // Open the folder picker. callback receives the chosen absolute path.
        function pickFolder(callback, startDir="/"){
            folderPickerCallback = callback;
            folderPickerLoad(startDir);
            $("#folder_picker")[0].showModal();
        }

        function folderPickerLoad(dir){
            $.get("./api/disks/browse?dir=" + encodeURIComponent(dir), function(data){
                if (data.error != undefined){
                    msgbox("Error: " + data.error);
                    return;
                }
                folderPickerCurrentDir = data.currentDir;
                $("#folder_picker_path").text(data.currentDir);
                let list = $("#folder_picker_list");
                list.empty();
                if (data.currentDir != "/"){
                    list.append(`<a class="item" onclick="folderPickerLoad('${data.parentDir.replace(/'/g, "\\'")}');">
                        <span class="ts-icon is-turn-up-icon is-end-spaced"></span>..</a>`);
                }
                data.folders.forEach(function(folder){
                    let safePath = folder.path.replace(/'/g, "\\'");
                    let safeName = $("<span>").text(folder.name).html();
                    list.append(`<a class="item" onclick="folderPickerLoad('${safePath}');">
                        <span class="ts-icon is-folder-icon is-end-spaced"></span>${safeName}</a>`);
                });
                if (data.folders.length == 0 && data.currentDir == "/"){
                    list.append(`<div class="item is-disabled">No folders</div>`);
                }
            });
        }

        function folderPickerMkdir(){
            let name = $("#folder_picker_newname").val().trim();
            if (name == "" || name.includes("/")){
                msgbox("Invalid folder name");
                return;
            }
            let newPath = folderPickerCurrentDir.replace(/\/$/, "") + "/" + name;
            $.cjax({
                url: "./api/disks/mkdir",
                method: "POST",
                data: { dir: newPath },
                success: function(data){
                    if (data.error != undefined){
                        msgbox("Error: " + data.error);
                    }else{
                        msgbox(i18nc("folder_created_succ"));
                        $("#folder_picker_newname").val("");
                        folderPickerLoad(newPath);
                    }
                }
            });
        }

        function folderPickerConfirm(){
            $("#folder_picker")[0].close();
            if (folderPickerCallback){
                folderPickerCallback(folderPickerCurrentDir);
                folderPickerCallback = null;
            }
        }
    </script>
    <script>
        var ajaxRequests = [];
        $(".boko-panel-component").each(function(){
            var component = $(this).attr("component");
            if (component) {
               $(this).load("./components/" + component, function(response, status, xhr) {
                   if (status == "success") {
                       console.log("Component loaded successfully:", component);
                       if (typeof(relocale) != "undefined") {
                           relocale();
                       }
                   } else {
                       console.error("Failed to load component:", component, xhr.status, xhr.statusText);
                   }
               });
            }
        });

        $(".thisyear").text(new Date().getFullYear());

        function msgbox(msg, delay=3000){
            $("#msgbox .content").text(msg);
            $("#msgbox").stop().finish().fadeIn(200).delay(delay).fadeOut(200);
        }

        $("#msgbox .close").click(function(){
            $("#msgbox").stop().finish().fadeOut(200);
        });
        $("#msgbox").hide();

        /* ── Dependency / feature-gating ── */

        // Stored globally so components (e.g. status.html) can read it after
        // they finish loading.
        window.bokoDepReport = null;

        /**
         * applyFeatureGating(report)
         *
         * Receives the DependencyReport from /api/info/deps and:
         *  1. Shows a degraded-mode banner listing every missing dep.
         *  2. Disables navigation tabs for features whose deps are absent.
         */
        function applyFeatureGating(report) {
            window.bokoDepReport = report;

            // Only missing *required* deps trigger the degraded-mode banner.
            // Optional tools (e.g. network fs mount helpers) show their own
            // install hints inside the page that needs them.
            var missing = report.deps ? report.deps.filter(function(d){ return !d.found && d.required; }) : [];

            if (report.degradedMode || missing.length > 0) {
                var list = $("#boko-dep-missing-list");
                list.empty();
                missing.forEach(function(dep) {
                    var hints = "";
                    if (dep.installHints && dep.installHints.length > 0) {
                        hints = " &nbsp;—&nbsp; <code>" + dep.installHints[0] + "</code>";
                    }
                    list.append("<li><b>" + dep.name + "</b>" + hints + " <span style='color:var(--ts-gray-500);'>(" + dep.description + ")</span></li>");
                });

                // Only show the banner when deps are genuinely missing
                if (missing.length > 0) {
                    $("#boko-dep-warning").show();
                }
            }

            // Disable tabs for unavailable features.
            // A feature is "unavailable" when any dep tagged with it is missing.
            var unavailableFeatures = {};
            if (report.deps) {
                report.deps.forEach(function(dep) {
                    if (!dep.found) {
                        unavailableFeatures[dep.feature] = true;
                    }
                });
            }

            if (unavailableFeatures["raid"]) {
                var raidTab = $('[data-tab="tab-raid"]');
                raidTab.addClass("is-disabled").css("opacity", "0.45").css("cursor", "not-allowed")
                       .attr("title", "RAID management is unavailable (mdadm not found)");
                raidTab.off("click").on("click", function(e){ e.stopImmediatePropagation(); return false; });
            }

            if (unavailableFeatures["disks"]) {
                var disksTab = $('[data-tab="tab-disks"]');
                disksTab.addClass("is-disabled").css("opacity", "0.45").css("cursor", "not-allowed")
                        .attr("title", "Disk enumeration is unavailable");
                disksTab.off("click").on("click", function(e){ e.stopImmediatePropagation(); return false; });
            }

            // Fire a custom event so loaded components can react immediately.
            $(document).trigger("boko:depsloaded", [report]);
        }

        function loadAndApplyDeps() {
            $.get("./api/info/deps", function(report) {
                applyFeatureGating(report);
            }).fail(function() {
                console.warn("bokodm: could not fetch dependency report from /api/info/deps");
            });
        }

        $(document).ready(function(){ loadAndApplyDeps(); });

    </script>
    <script src="./js/locale.js"></script>
</body>
